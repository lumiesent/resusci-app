<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symulator 999</title>
    <script type="module" crossorigin src="./assets/index-CW1wsYZN.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BqOJKI4X.css">
  </head>
  <body>
    <div id="app">
      
      <div id="menu-screen">
        <header>Wybierz Scenariusz</header>
        
        <div id="loading-status" style="text-align: center; padding: 20px; color: var(--brand-cream);">
          Ładowanie sztucznej inteligencji...
        </div>
        
        <div class="scenario-list hidden" id="scenario-list">
          <button class="scenario-card" data-scenario="allergy">
            <div class="scenario-icon">🐝</div>
            <div class="scenario-info">
              <h3>Alergie</h3>
              <p>Użądlenie, duszności, opuchlizna.</p>
            </div>
          </button>
          
          <button class="scenario-card" data-scenario="stomach">
            <div class="scenario-icon">🌰</div>
            <div class="scenario-info">
              <h3>Ból Brzucha</h3>
              <p>Kłujący ból żołądka, wymioty.</p>
            </div>
          </button>

          <button class="scenario-card" data-scenario="headache">
            <div class="scenario-icon">🧠</div>
            <div class="scenario-info">
              <h3>Ból Głowy</h3>
              <p>Zawroty głowy, wymioty, problemy z wizją.</p>
            </div>
          </button>

          <button class="scenario-card" data-scenario="backpain">
            <div class="scenario-icon">🦴</div>
            <div class="scenario-info">
              <h3>Ból Pleców</h3>
              <p>Ból nóg, drętwienie, zaparcia.</p>
            </div>
          </button>
          
        </div>
      </div>

      <div id="chat-screen" class="hidden">
        <header class="chat-header">
          <button id="back-btn">← Wróć</button>
          <span>Numer 112</span>
          <div style="width: 60px;"></div> 
        </header>
        
        <div id="chat-window"></div>
        
        <div id="hint-box">
          <strong>Wskazówka:</strong> <span id="hint-text">Czekam na połączenie...</span>
        </div>
        
        <div id="input-area">
          <button id="mic-btn" title="Mów">Mikrofon</button>
          <input type="text" id="user-input" placeholder="Napisz odpowiedź..." autocomplete="off"/>
          <button id="send-btn">Wyślij</button>
        </div>
      </div>

    </div>
  </body>
</html>
